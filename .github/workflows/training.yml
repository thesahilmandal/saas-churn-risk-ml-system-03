name: Model Training Pipeline

on:
  workflow_dispatch: 
    # This acts as a webhook target for our TriggerEngine in the Monitoring app

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY_TRAINING: churn-training

jobs:
  train-and-reload:
    name: Train Model and Hot Reload
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull Training Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY_TRAINING:latest

      - name: Create .env file dynamically
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> .env
          echo "MONGODB_URL=${{ secrets.MONGODB_URL }}" >> .env
          echo "MONGODB_DATABASE=${{ secrets.MONGODB_DATABASE }}" >> .env
          echo "MONGODB_PREDICTION_LOGGING_COLLECTION=${{ secrets.MONGODB_PREDICTION_LOGGING_COLLECTION }}" >> .env
          echo "MONGODB_DLQ_COLLETION=${{ secrets.MONGODB_DLQ_COLLETION }}" >> .env
          # Passing the EC2 host directly so the Python script can ping the /reload endpoint
          echo "EC2_HOST=${{ secrets.EC2_HOST }}" >> .env

      - name: Execute Training Pipeline
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker run --rm --env-file .env $ECR_REGISTRY/$ECR_REPOSITORY_TRAINING:latest

      - name: Optional Fallback - Trigger EC2 Hot Reload
        # If your Python code doesn't hit the /reload endpoint internally, 
        # this step forcefully instructs the EC2 instance to pull the new S3 model.
        run: |
          curl -X POST "http://${{ secrets.EC2_HOST }}:8000/reload" -H "accept: application/json"

      - name: Cleanup Secrets
        if: always()
        run: rm -f .env